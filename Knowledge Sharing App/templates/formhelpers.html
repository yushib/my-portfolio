{% macro render_field(field) %}
  <div class="form-group">
    {{ field.label(class="form-label") }}
    {{ field(class="form-control", **kwargs)|safe }}
    {% if field.errors %}
      {% for error in field.errors %}
        <span style="color: red;">[{{ error }}]</span>
      {% endfor %}
    {% endif %}
  </div>
{% endmacro %}
