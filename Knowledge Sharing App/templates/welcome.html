<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7f8;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            min-height: 100vh;
        }

        /* タイトルは上寄り */
        #login-title-area {
            padding-top: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        #login-title-area h1 {
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
        }

        /* フォーム位置を“わずかに上げた”調整 */
        #login-form-box {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            margin-top: 90px; /* ← 120px から 90px に変更（少し上） */
            background: #fff;
            padding: 30px 40px;
            border: 1px solid #ddd;
        }

        input.form-control {
            border: 1px solid #000 !important;
            border-radius: 0 !important;
        }
        .form-check-input {
            border: 1px solid #000 !important;
        }
        .btn-black {
            background: #000 !important;
            color: #fff !important;
            padding: 10px 60px;
            border-radius: 0;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="login-title-area">
        <h1>Knowledge Sharing</h1>
    </div>

    <div id="login-form-box">
        <form action="{{ url_for('auth.welcome') }}" method="POST">
            {{ form.hidden_tag() }}

            <div class="mb-3">
                <label class="fw-bold">ユーザーID</label>
                {{ form.user_id(class="form-control") }}
            </div>

            <div class="mb-4">
                <label class="fw-bold">パスワード</label>
                {{ form.password(class="form-control") }}
            </div>

            <div class="mb-4">
                <div class="form-check mb-2">
                    {{ form.is_manager(class="form-check-input") }}
                    <label class="form-check-label fw-bold ms-2">Manager</label>
                </div>
                <div class="form-check">
                    {{ form.is_hr(class="form-check-input") }}
                    <label class="form-check-label fw-bold ms-2">HR</label>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-black">ログイン</button>
            </div>
        </form>
    </div>

</body>
</html>
